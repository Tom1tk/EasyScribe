name: Build and Publish Release

# Trigger manually from the GitHub Actions tab.
# Provide a tag and CUDA version — a GitHub Release is created automatically.
#
# Two ZIP assets are published per release (both under GitHub's 2 GB limit):
#   - Transcriber7-<tag>-app.zip    (~1.1 GB) — exe + CUDA DLLs + ffmpeg
#   - Transcriber7-<tag>-model.zip  (~1.5 GB) — model files only
#
# First-time install: extract both ZIPs into the same folder.
# App updates:        re-extract app.zip only (model never changes).
#
# Cache strategy (skips re-downloading on repeat builds):
#   ffmpeg    ~70 MB   key: ffmpeg-win64-gpl-static-v1              (bump v1 to refresh)
#   venv      ~3-4 GB  key: venv-win64-py3.11-cu<VER>-v1            (bump v1 to refresh)
#   model     ~1.5 GB  key: faster-whisper-large-v3-turbo-mobiuslabs-v1
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      cuda_version:
        description: 'CUDA version, e.g. 124 or 128 (required for GPU support)'
        required: true
        default: '128'

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  build:
    name: Build portable Windows release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache ffmpeg (~70 MB, rarely changes) ──────────────────────────────
      - name: Cache ffmpeg
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: tools\ffmpeg
          key: ffmpeg-win64-gpl-static-v1

      # ── 3b. Download ffmpeg (skipped on cache hit) ────────────────────────────
      - name: Download ffmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading ffmpeg..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          New-Item -ItemType Directory -Force -Path tools\ffmpeg | Out-Null
          $binFile = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $binDir  = $binFile.DirectoryName
          Copy-Item "$binDir\ffmpeg.exe"  tools\ffmpeg\ffmpeg.exe
          Copy-Item "$binDir\ffprobe.exe" tools\ffmpeg\ffprobe.exe
          Remove-Item ffmpeg_tmp -Recurse -Force
          Remove-Item ffmpeg.zip -Force
          Write-Host "ffmpeg ready."

      # ── 4. Cache model (~1.5 GB, content never changes) ──────────────────────
      - name: Cache Faster Whisper model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models/faster-whisper-large-v3-turbo
          key: faster-whisper-large-v3-turbo-mobiuslabs-v1

      # ── 4b. Download model from HuggingFace (skipped on cache hit) ────────────
      - name: Download Faster Whisper model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet

          $script = @"
          import os
          from huggingface_hub import snapshot_download
          token = os.environ.get('HF_TOKEN') or None
          local_dir = 'models/faster-whisper-large-v3-turbo'
          print(f'Downloading model to {local_dir} ...')
          snapshot_download(
              repo_id='mobiuslabsgmbh/faster-whisper-large-v3-turbo',
              local_dir=local_dir,
              ignore_patterns=['*.gitattributes', '*.md', '.git*', '*.gitignore'],
              token=token,
          )
          print('Model download complete.')
          "@

          $script | python

      # ── 5. Cache Python venv (CUDA torch + all deps, ~3-4 GB) ────────────────
      # Key includes cuda_version — different CUDA builds must not share a cache.
      # Bump v1 → v2 to force a clean reinstall (e.g. after adding a package).
      - name: Cache Python venv
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: venv
          key: venv-win64-py3.11-cu${{ github.event.inputs.cuda_version }}-v1

      # ── 5b. Install Python dependencies (skipped on cache hit) ───────────────
      - name: Install Python dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          CUDA_VERSION: ${{ github.event.inputs.cuda_version }}
        run: |
          python -m venv venv
          & venv\Scripts\Activate.ps1

          python -m pip install --upgrade pip --quiet

          $indexUrl = "https://download.pytorch.org/whl/cu$($env:CUDA_VERSION)"
          Write-Host "Installing PyTorch CUDA $($env:CUDA_VERSION) from $indexUrl"
          pip install torch torchaudio --index-url $indexUrl --quiet

          Write-Host "Installing core dependencies..."
          pip install faster-whisper customtkinter tkinterdnd2 pyinstaller --quiet

          Write-Host "Installed packages:"
          pip list --format=columns

      # ── 6. Build with PyInstaller ─────────────────────────────────────────────
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          & venv\Scripts\Activate.ps1
          pyinstaller Transcriber7.spec --noconfirm
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed" }
          Write-Host "PyInstaller build complete."

      # ── 6b. Copy CUDA runtime DLLs into _internal/ ────────────────────────────
      # PyInstaller hooks are unreliable for placing DLLs where ctranslate2 can
      # find them via Windows DLL search. We copy them explicitly instead.
      # cublas/cublasLt/cudart/cudnn are all ctranslate2 needs for float16 GPU.
      - name: Copy CUDA runtime DLLs
        shell: pwsh
        env:
          CUDA_VERSION: ${{ github.event.inputs.cuda_version }}
        run: |
          $torchLib   = "venv\Lib\site-packages\torch\lib"
          $internalDir = "dist\PortableTranscriber\_internal"

          if (-not (Test-Path $torchLib)) {
            throw "torch lib not found at $torchLib"
          }

          $patterns = @("cublas64_*.dll", "cublasLt64_*.dll", "cudart64_*.dll", "cudnn_*.dll", "cudnn64_*.dll")
          $copied = 0
          foreach ($pat in $patterns) {
            Get-ChildItem "$torchLib\$pat" -ErrorAction SilentlyContinue | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 1)
              Copy-Item $_.FullName "$internalDir\" -Force
              Write-Host "  Copied $($_.Name)  ($sizeMB MB)"
              $copied++
            }
          }

          if ($copied -eq 0) { throw "No CUDA DLLs found in $torchLib — check cuda_version input" }
          Write-Host "Total CUDA DLLs copied: $copied"

          # Show everything CUDA-related now in _internal/ for verification
          Write-Host "`nCUDA DLLs in _internal/:"
          Get-ChildItem "$internalDir\cu*.dll", "$internalDir\cudnn*.dll" -ErrorAction SilentlyContinue |
            Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}} |
            Format-Table -AutoSize

      # ── 7. Assemble portable app folder (no model) ────────────────────────────
      - name: Assemble PortableTranscriber folder
        shell: pwsh
        run: |
          $dist = "dist\PortableTranscriber"

          # Copy ffmpeg
          $ffmpegDst = "$dist\ffmpeg"
          New-Item -ItemType Directory -Force -Path $ffmpegDst | Out-Null
          Copy-Item "tools\ffmpeg\*" $ffmpegDst -Force

          # Create runtime dirs
          New-Item -ItemType Directory -Force -Path "$dist\logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dist\temp" | Out-Null

          # Placeholder so users know where to put the model
          New-Item -ItemType Directory -Force -Path "$dist\models\faster-whisper-large-v3-turbo" | Out-Null
          $placeholder = "Extract Transcriber7-*-model.zip into this same folder to install the model."
          Set-Content -Path "$dist\models\faster-whisper-large-v3-turbo\EXTRACT_MODEL_ZIP_HERE.txt" -Value $placeholder -Encoding utf8

          # Summary
          $totalMB = (Get-ChildItem $dist -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "App folder size: $([math]::Round($totalMB, 0)) MB"
          Get-ChildItem $dist | Select-Object Name

      # ── 8. Create release ZIPs ────────────────────────────────────────────────
      - name: Create release ZIPs
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"

          # ── ZIP 1: app only (exe + CUDA DLLs + ffmpeg, no model) ─────────────
          $zipApp = "Transcriber7-${tag}-app.zip"
          Write-Host "Creating $zipApp ..."
          Compress-Archive -Path "dist\PortableTranscriber\*" -DestinationPath $zipApp -CompressionLevel Optimal
          $sz1 = [math]::Round((Get-Item $zipApp).Length / 1MB, 1)
          Write-Host "  Size: ${sz1} MB"

          # ── ZIP 2: model only ─────────────────────────────────────────────────
          # Zipped as models\faster-whisper-large-v3-turbo\* so extracting into
          # the same folder as app.zip drops files in exactly the right place.
          $zipModel = "Transcriber7-${tag}-model.zip"
          Write-Host "Creating $zipModel ..."
          Compress-Archive -Path "models" -DestinationPath $zipModel -CompressionLevel Optimal
          $sz2 = [math]::Round((Get-Item $zipModel).Length / 1MB, 1)
          Write-Host "  Size: ${sz2} MB"

      # ── 9. Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "Transcriber7 ${{ github.event.inputs.tag }}"
          body: |
            ## Transcriber7 — Portable Offline Speech-to-Text

            Two downloads — both required for a first-time install:

            | Asset | Size | Contents |
            |---|---|---|
            | `...-app.zip` | ~1.1 GB | Exe + CUDA DLLs + ffmpeg (re-download on updates) |
            | `...-model.zip` | ~1.5 GB | Model files only (download once, keep forever) |

            ---

            ### First-time install
            1. Download both ZIPs
            2. Create a folder anywhere (Desktop, USB stick, etc.)
            3. Extract **app.zip** into that folder
            4. Extract **model.zip** into the **same folder** — the `models\` directory will merge automatically
            5. Double-click **PortableTranscriber.exe**

            ### Updating the app
            Only re-download and re-extract `...-app.zip` — your model folder stays untouched.

            ---

            ### Supported input formats
            mp4, mkv, mov, avi, webm, mp3, wav, m4a, flac, ogg, opus, aac

            ### GPU acceleration
            NVIDIA GPU is used automatically — CUDA ${{ github.event.inputs.cuda_version }} runtime DLLs are bundled.
            Falls back to CPU if no compatible GPU is found.

            ### First launch note
            Windows Defender SmartScreen may show **"Windows protected your PC"** — click **More info → Run anyway**.
            This is expected for unsigned PyInstaller executables.
          files: |
            Transcriber7-${{ github.event.inputs.tag }}-app.zip
            Transcriber7-${{ github.event.inputs.tag }}-model.zip
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
