name: Build & Publish Release

# Trigger manually from the GitHub Actions tab.
# Provide a tag like "v1.0.0" — a GitHub Release is created automatically.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      cuda_version:
        description: 'CUDA version for GPU support, e.g. 121 or 124 (leave blank for CPU-only)'
        required: false
        default: ''

jobs:
  build:
    name: Build portable Windows release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Download ffmpeg (Windows static build) ────────────────────────────
      - name: Download ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading ffmpeg..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          New-Item -ItemType Directory -Force -Path tools\ffmpeg | Out-Null
          $binFile = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $binDir  = $binFile.DirectoryName
          Copy-Item "$binDir\ffmpeg.exe"  tools\ffmpeg\ffmpeg.exe
          Copy-Item "$binDir\ffprobe.exe" tools\ffmpeg\ffprobe.exe
          Remove-Item ffmpeg_tmp -Recurse -Force
          Remove-Item ffmpeg.zip -Force
          Write-Host "ffmpeg ready."

      # ── 4. Download model from HuggingFace ───────────────────────────────────
      - name: Download Faster Whisper model
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet

          $script = @"
          import os
          from huggingface_hub import snapshot_download
          token = os.environ.get('HF_TOKEN') or None
          local_dir = 'models/faster-whisper-large-v3-turbo'
          print(f'Downloading model to {local_dir} ...')
          snapshot_download(
              repo_id='mobiuslabsgmbh/faster-whisper-large-v3-turbo',
              local_dir=local_dir,
              ignore_patterns=['*.gitattributes', '*.md', '.git*', '*.gitignore'],
              token=token,
          )
          print('Model download complete.')
          "@

          $script | python

      # ── 5. Install Python dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        shell: pwsh
        env:
          CUDA_VERSION: ${{ github.event.inputs.cuda_version }}
        run: |
          python -m venv venv
          & venv\Scripts\Activate.ps1

          python -m pip install --upgrade pip --quiet

          if ($env:CUDA_VERSION -ne '') {
            $indexUrl = "https://download.pytorch.org/whl/cu$($env:CUDA_VERSION)"
            Write-Host "Installing PyTorch with CUDA $($env:CUDA_VERSION) from $indexUrl"
            pip install torch torchaudio --index-url $indexUrl --quiet
          } else {
            Write-Host "Installing PyTorch CPU..."
            pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu --quiet
          }

          Write-Host "Installing core dependencies..."
          pip install faster-whisper customtkinter tkinterdnd2 pyinstaller --quiet

          Write-Host "Installed packages:"
          pip list --format=columns

      # ── 6. Build with PyInstaller ─────────────────────────────────────────────
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          & venv\Scripts\Activate.ps1
          pyinstaller Transcriber7.spec --noconfirm
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed" }
          Write-Host "PyInstaller build complete."

      # ── 7. Assemble portable output folder ───────────────────────────────────
      - name: Assemble PortableTranscriber folder
        shell: pwsh
        run: |
          $dist = "dist\PortableTranscriber"

          # Copy model files
          $modelDst = "$dist\models\faster-whisper-large-v3-turbo"
          New-Item -ItemType Directory -Force -Path $modelDst | Out-Null
          Copy-Item "models\faster-whisper-large-v3-turbo\*" $modelDst -Recurse -Force

          # Copy ffmpeg
          $ffmpegDst = "$dist\ffmpeg"
          New-Item -ItemType Directory -Force -Path $ffmpegDst | Out-Null
          Copy-Item "tools\ffmpeg\*" $ffmpegDst -Force

          # Create runtime dirs
          New-Item -ItemType Directory -Force -Path "$dist\logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dist\temp" | Out-Null

          # Summary
          $totalMB = (Get-ChildItem $dist -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Total folder size: $([math]::Round($totalMB, 0)) MB"
          Get-ChildItem $dist | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,1)}}

      # ── 8. Create release ZIP ─────────────────────────────────────────────────
      - name: Create release ZIP
        shell: pwsh
        run: |
          $tag     = "${{ github.event.inputs.tag }}"
          $zipName = "Transcriber7-${tag}-portable.zip"
          Write-Host "Creating $zipName ..."
          Compress-Archive -Path "dist\PortableTranscriber\*" -DestinationPath $zipName -CompressionLevel Optimal
          $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "ZIP size: ${sizeMB} MB"
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 9. Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "Transcriber7 ${{ github.event.inputs.tag }}"
          body: |
            ## Transcriber7 — Portable Offline Speech-to-Text

            ### How to use
            1. Download `Transcriber7-${{ github.event.inputs.tag }}-portable.zip`
            2. Extract anywhere (Desktop, USB stick, etc.)
            3. Double-click **PortableTranscriber.exe**

            No installation required. No internet needed after download.

            ### What's bundled
            - `PortableTranscriber.exe` — the application
            - `models/faster-whisper-large-v3-turbo/` — speech-to-text model
            - `ffmpeg/ffmpeg.exe` — audio decoder (all common video/audio formats)

            ### Supported input formats
            mp4, mkv, mov, avi, webm, mp3, wav, m4a, flac, ogg, opus, aac

            ### GPU acceleration
            NVIDIA GPU is used automatically if a compatible driver is present.
            Falls back to CPU otherwise. The Device dropdown lists all available GPUs.

            ### First launch note
            Windows Defender SmartScreen may show "Windows protected your PC" for an
            unrecognised app. Click **More info → Run anyway**. This is expected for
            unsigned executables built with PyInstaller.
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
