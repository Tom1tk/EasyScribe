name: Build and Publish Release

# Trigger manually from the GitHub Actions tab.
# Provide a tag like "v1.0.0" — a GitHub Release is created automatically.
# Two ZIP assets are published per release:
#   - Transcriber7-<tag>-portable-with-model.zip  (~1.8 GB, extract and run)
#   - Transcriber7-<tag>-portable-no-model.zip    (~300 MB, add your own model)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      cuda_version:
        description: 'CUDA version for GPU support, e.g. 121 or 124 (leave blank for CPU-only)'
        required: false
        default: ''

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  build:
    name: Build portable Windows release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Download ffmpeg (Windows static build) ────────────────────────────
      - name: Download ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading ffmpeg..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          New-Item -ItemType Directory -Force -Path tools\ffmpeg | Out-Null
          $binFile = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $binDir  = $binFile.DirectoryName
          Copy-Item "$binDir\ffmpeg.exe"  tools\ffmpeg\ffmpeg.exe
          Copy-Item "$binDir\ffprobe.exe" tools\ffmpeg\ffprobe.exe
          Remove-Item ffmpeg_tmp -Recurse -Force
          Remove-Item ffmpeg.zip -Force
          Write-Host "ffmpeg ready."

      # ── 4. Download model from HuggingFace ───────────────────────────────────
      - name: Download Faster Whisper model
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet

          $script = @"
          import os
          from huggingface_hub import snapshot_download
          token = os.environ.get('HF_TOKEN') or None
          local_dir = 'models/faster-whisper-large-v3-turbo'
          print(f'Downloading model to {local_dir} ...')
          snapshot_download(
              repo_id='mobiuslabsgmbh/faster-whisper-large-v3-turbo',
              local_dir=local_dir,
              ignore_patterns=['*.gitattributes', '*.md', '.git*', '*.gitignore'],
              token=token,
          )
          print('Model download complete.')
          "@

          $script | python

      # ── 5. Install Python dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        shell: pwsh
        env:
          CUDA_VERSION: ${{ github.event.inputs.cuda_version }}
        run: |
          python -m venv venv
          & venv\Scripts\Activate.ps1

          python -m pip install --upgrade pip --quiet

          if ($env:CUDA_VERSION -ne '') {
            $indexUrl = "https://download.pytorch.org/whl/cu$($env:CUDA_VERSION)"
            Write-Host "Installing PyTorch with CUDA $($env:CUDA_VERSION) from $indexUrl"
            pip install torch torchaudio --index-url $indexUrl --quiet
          } else {
            Write-Host "Installing PyTorch CPU..."
            pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu --quiet
          }

          Write-Host "Installing core dependencies..."
          pip install faster-whisper customtkinter tkinterdnd2 pyinstaller --quiet

          Write-Host "Installed packages:"
          pip list --format=columns

      # ── 6. Build with PyInstaller ─────────────────────────────────────────────
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          & venv\Scripts\Activate.ps1
          pyinstaller Transcriber7.spec --noconfirm
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed" }
          Write-Host "PyInstaller build complete."

      # ── 7. Assemble portable output folder (with model) ──────────────────────
      - name: Assemble PortableTranscriber folder
        shell: pwsh
        run: |
          $dist = "dist\PortableTranscriber"

          # Copy model files
          $modelDst = "$dist\models\faster-whisper-large-v3-turbo"
          New-Item -ItemType Directory -Force -Path $modelDst | Out-Null
          Copy-Item "models\faster-whisper-large-v3-turbo\*" $modelDst -Recurse -Force

          # Copy ffmpeg
          $ffmpegDst = "$dist\ffmpeg"
          New-Item -ItemType Directory -Force -Path $ffmpegDst | Out-Null
          Copy-Item "tools\ffmpeg\*" $ffmpegDst -Force

          # Create runtime dirs
          New-Item -ItemType Directory -Force -Path "$dist\logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dist\temp" | Out-Null

          # Summary
          $totalMB = (Get-ChildItem $dist -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Total folder size: $([math]::Round($totalMB, 0)) MB"
          Get-ChildItem $dist | Select-Object Name

      # ── 8. Create both release ZIPs ───────────────────────────────────────────
      - name: Create release ZIPs
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"

          # ── ZIP 1: with model bundled ────────────────────────────────────────
          $zipWithModel = "Transcriber7-${tag}-portable-with-model.zip"
          Write-Host "Creating $zipWithModel ..."
          Compress-Archive -Path "dist\PortableTranscriber\*" -DestinationPath $zipWithModel -CompressionLevel Optimal
          $sz1 = [math]::Round((Get-Item $zipWithModel).Length / 1MB, 1)
          Write-Host "  Size: ${sz1} MB"

          # ── ZIP 2: without model (app + ffmpeg only) ─────────────────────────
          # Use robocopy to copy everything EXCEPT the models folder.
          # Copy-Item -Recurse has a quirk where it can nest the source inside
          # the destination, causing _internal and other top-level items to go
          # missing. robocopy /XD is reliable and only excludes models/.
          New-Item -ItemType Directory -Force -Path "dist\PortableTranscriber-NoModel" | Out-Null
          # robocopy exit codes 0-7 are success; suppress error on those
          robocopy "dist\PortableTranscriber" "dist\PortableTranscriber-NoModel" /E /XD "models" /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -gt 7) { throw "robocopy failed with exit code $LASTEXITCODE" }

          # Add a placeholder inside models/ so the folder structure is clear
          New-Item -ItemType Directory -Force -Path "dist\PortableTranscriber-NoModel\models\faster-whisper-large-v3-turbo" | Out-Null
          $placeholder = "Place the 5 model files here:`n  config.json`n  model.bin`n  preprocessor_config.json`n  tokenizer.json`n  vocabulary.json`n`nDownload from:`nhttps://huggingface.co/mobiuslabsgmbh/faster-whisper-large-v3-turbo"
          Set-Content -Path "dist\PortableTranscriber-NoModel\models\faster-whisper-large-v3-turbo\PUT_MODEL_FILES_HERE.txt" -Value $placeholder -Encoding utf8

          $zipNoModel = "Transcriber7-${tag}-portable-no-model.zip"
          Write-Host "Creating $zipNoModel ..."
          Compress-Archive -Path "dist\PortableTranscriber-NoModel\*" -DestinationPath $zipNoModel -CompressionLevel Optimal
          $sz2 = [math]::Round((Get-Item $zipNoModel).Length / 1MB, 1)
          Write-Host "  Size: ${sz2} MB"

          # Export names for next step
          echo "ZIP_WITH_MODEL=$zipWithModel"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "ZIP_NO_MODEL=$zipNoModel"         | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 9. Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "Transcriber7 ${{ github.event.inputs.tag }}"
          body: |
            ## Transcriber7 — Portable Offline Speech-to-Text

            Two downloads are provided — pick whichever suits you:

            | Asset | Size | Description |
            |---|---|---|
            | `...-with-model.zip` | ~1.8 GB | **Everything included** — extract and run immediately |
            | `...-no-model.zip` | ~300 MB | App + ffmpeg only — add your own model files |

            ---

            ### Option A — with-model (recommended)
            1. Download `Transcriber7-${{ github.event.inputs.tag }}-portable-with-model.zip`
            2. Extract anywhere (Desktop, USB stick, etc.)
            3. Double-click **PortableTranscriber.exe**

            ### Option B — no-model
            1. Download `Transcriber7-${{ github.event.inputs.tag }}-portable-no-model.zip`
            2. Extract anywhere
            3. Copy your `faster-whisper-large-v3-turbo` model files into `models\faster-whisper-large-v3-turbo\`
               (needs: `config.json`, `model.bin`, `preprocessor_config.json`, `tokenizer.json`, `vocabulary.json`)
            4. Double-click **PortableTranscriber.exe**

            ---

            ### Supported input formats
            mp4, mkv, mov, avi, webm, mp3, wav, m4a, flac, ogg, opus, aac

            ### GPU acceleration
            NVIDIA GPU used automatically if a compatible driver is present. Falls back to CPU otherwise.

            ### First launch note
            Windows Defender SmartScreen may show **"Windows protected your PC"** — click **More info → Run anyway**.
            This is expected for unsigned PyInstaller executables.
          files: |
            ${{ env.ZIP_WITH_MODEL }}
            ${{ env.ZIP_NO_MODEL }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
